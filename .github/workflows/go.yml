name: Go
permissions:
  contents: read

on:
  push:
    branches:
      - v0
  pull_request:
    branches:
      - v0

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version:
          - '1.25'
          - '1.26'
          - 'stable'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Test
        run: go test ./...
